name: Bump Version

on:
  push:
    branches: [main]

concurrency:
  group: bump-version-main
  cancel-in-progress: false

jobs:
  bump:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip version]')
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          persist-credentials: false
          ref: main
          fetch-depth: 0

      - name: Sync latest main
        run: |
          git fetch origin main --tags
          git checkout main
          git reset --hard origin/main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Commit and push
        run: |
          NEW_VERSION=$(node -e "console.log(require('./package.json').version)")
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote set-url origin https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/${{ github.repository }}.git

          git add package.json package-lock.json
          git commit -m "chore(version): bump to v${NEW_VERSION} [skip version]"
          git push origin HEAD:main

          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
