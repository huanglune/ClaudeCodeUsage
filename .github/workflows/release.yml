name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Currently: tag push produces a .vsix artifact attached to the GitHub
# Release page. Marketplace publishing (VS Marketplace + Open VSX) is
# intentionally OFF until the maintainer registers tokens. See
# README-en.md § "Maintainer Setup" for the re-enable steps.

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run compile
      - name: Package .vsix
        run: npx vsce package -o extension.vsix --no-dependencies
      - name: Attach .vsix to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: extension.vsix
          generate_release_notes: true
